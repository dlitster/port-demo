apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "development-environment.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "development-environment.policyLabels" . | nindent 4 }}
  annotations:
    {{- include "development-environment.policyAnnotations" . | nindent 4 }}
subjects:
  - kind: {{ .Values.roleBinding.subjectKind }}
    name: {{ .Values.roleBinding.subjectName | quote }}
    {{- if eq .Values.roleBinding.subjectKind "ServiceAccount" }}
    namespace: {{ .Release.Namespace }}
    {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
