name: Provision development environment

on:
  repository_dispatch:
    types: [provision-dev-env]
  workflow_dispatch:
    inputs:
      service:
        description: Service name
        required: true
        type: string
      environment:
        description: Environment name
        required: true
        type: string
      size:
        description: Environment size
        required: true
        type: string
      owner:
        description: Environment owner
        required: true
        type: string
      expiration:
        description: RFC3339 UTC expiration timestamp
        required: true
        type: string
      port-run-id:
        description: Port action run identifier
        required: true
        type: string

permissions:
  contents: read

jobs:
  normalize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      service: ${{ steps.normalize.outputs.service }}
      environment: ${{ steps.normalize.outputs.environment }}
      size: ${{ steps.normalize.outputs.size }}
      owner: ${{ steps.normalize.outputs.owner }}
      expiration: ${{ steps.normalize.outputs.expiration }}
      port-run-id: ${{ steps.normalize.outputs.port-run-id }}
    steps:
      - id: normalize
        env:
          RAW_SERVICE: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.service || inputs.service }}
          RAW_ENVIRONMENT: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.environment || inputs.environment }}
          RAW_SIZE: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.size || inputs.size }}
          RAW_OWNER: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.owner || inputs.owner }}
          RAW_EXPIRATION: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.expiration || inputs.expiration }}
          RAW_PORT_RUN_ID: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload['port-run-id'] || inputs['port-run-id'] }}
        run: |
          set -euo pipefail
          reject_line_endings() {
            if [[ $1 == *$'\r'* || $1 == *$'\n'* ]]; then
              printf 'Dispatch inputs must not contain carriage returns or line feeds\n' >&2
              exit 1
            fi
          }

          reject_line_endings "$RAW_SERVICE"
          reject_line_endings "$RAW_ENVIRONMENT"
          reject_line_endings "$RAW_SIZE"
          reject_line_endings "$RAW_OWNER"
          reject_line_endings "$RAW_EXPIRATION"
          reject_line_endings "$RAW_PORT_RUN_ID"

          normalize_dns_name() {
            printf '%s' "$1" | tr '[:upper:]_' '[:lower:]-'
          }

          service="$(normalize_dns_name "$RAW_SERVICE")"
          environment="$(normalize_dns_name "$RAW_ENVIRONMENT")"
          size="$(printf '%s' "$RAW_SIZE" | tr '[:upper:]' '[:lower:]')"
          owner="$(normalize_dns_name "$RAW_OWNER")"

          printf 'service=%s\n' "$service" >> "$GITHUB_OUTPUT"
          printf 'environment=%s\n' "$environment" >> "$GITHUB_OUTPUT"
          printf 'size=%s\n' "$size" >> "$GITHUB_OUTPUT"
          printf 'owner=%s\n' "$owner" >> "$GITHUB_OUTPUT"
          printf 'expiration=%s\n' "$RAW_EXPIRATION" >> "$GITHUB_OUTPUT"
          printf 'port-run-id=%s\n' "$RAW_PORT_RUN_ID" >> "$GITHUB_OUTPUT"

  commit:
    needs: normalize
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: provision-dev-env-${{ needs.normalize.outputs.service }}-${{ needs.normalize.outputs.environment }}
      cancel-in-progress: false
    outputs:
      values-path: ${{ steps.write-values.outputs.values-path }}
      commit-sha: ${{ steps.commit.outputs.commit-sha }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: master
          fetch-depth: 0

      - id: write-values
        env:
          SERVICE: ${{ needs.normalize.outputs.service }}
          ENVIRONMENT: ${{ needs.normalize.outputs.environment }}
          SIZE: ${{ needs.normalize.outputs.size }}
          OWNER: ${{ needs.normalize.outputs.owner }}
          EXPIRATION: ${{ needs.normalize.outputs.expiration }}
          PORT_RUN_ID: ${{ needs.normalize.outputs.port-run-id }}
        run: |
          set -euo pipefail
          git fetch origin master
          git rebase origin/master
          scripts/write-environment-values.sh \
            "$SERVICE" "$ENVIRONMENT" "$SIZE" "$OWNER" "$EXPIRATION" "$PORT_RUN_ID"
          printf 'values-path=environments/%s/%s/values.yaml\n' "$SERVICE" "$ENVIRONMENT" >> "$GITHUB_OUTPUT"

      - id: commit
        env:
          VALUES_PATH: ${{ steps.write-values.outputs.values-path }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$VALUES_PATH"
          git commit -m "Provision $VALUES_PATH"
          for attempt in 1 2 3; do
            if git push origin HEAD:master; then
              printf 'commit-sha=%s\n' "$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            git fetch origin master
            if git ls-tree -r --name-only origin/master -- "$VALUES_PATH" | grep -Fx "$VALUES_PATH" >/dev/null; then
              printf 'Refusing to overwrite concurrently created %s\n' "$VALUES_PATH" >&2
              exit 1
            fi

            if ! git rebase origin/master; then
              git rebase --abort
              printf 'Rebase conflict while reconciling %s; refusing to overwrite\n' "$VALUES_PATH" >&2
              exit 1
            fi
          done

          printf 'Unable to push %s after bounded retries\n' "$VALUES_PATH" >&2
          exit 1

      - name: Summarize provisioning
        env:
          VALUES_PATH: ${{ steps.write-values.outputs.values-path }}
          COMMIT_SHA: ${{ steps.commit.outputs.commit-sha }}
        run: |
          {
            printf '## Development environment provisioned\n\n'
            printf -- '- Values path: `%s`\n' "$VALUES_PATH"
            printf -- '- Commit: `%s`\n' "$COMMIT_SHA"
          } >> "$GITHUB_STEP_SUMMARY"
